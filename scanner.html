<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - Roastery Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#271310", "on-primary": "#ffffff", "surface": "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442", "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd", "outline-variant": "#d3c3c0", error: "#ba1a1a", "error-container": "#ffdad6" },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--color-outline-variant); background: #fff; }
        
        /* ระบบเลื่อนซ้ายเพื่อลบ (Swipe to Delete) */
        .swipe-container {
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            display: flex;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        .swipe-container::-webkit-scrollbar { display: none; }
        .swipe-content {
            min-width: 100%;
            scroll-snap-align: start;
        }
        .swipe-action {
            min-width: 80px;
            scroll-snap-align: end;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col antialiased">

    <header class="w-full top-0 sticky bg-surface flex items-center px-4 h-14 z-30 shadow-sm border-b border-outline-variant">
        <a href="index.html" class="mr-3 p-1.5 rounded-full hover:bg-surface-container-low active:scale-90 transition-all text-on-surface-variant">
            <span class="material-symbols-outlined text-[24px]">arrow_back</span>
        </a>
        <h1 class="text-lg font-bold tracking-tight text-primary flex-1 truncate">สแกนรับเข้า</h1>
    </header>

    <main class="p-4 flex flex-col gap-4 w-full max-w-lg mx-auto pb-24">
        
        <div class="bg-surface-container-lowest p-3 rounded-xl border border-outline-variant flex justify-between items-center shadow-sm">
            <span class="text-xs font-bold text-on-surface-variant">ใบงานปัจจุบัน:</span>
            <span id="woDisplay" class="text-sm font-bold text-primary font-mono bg-surface-container-low px-2 py-1 rounded border border-outline-variant">ไม่ระบุใบงาน</span>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-2 text-center h-24 shadow-sm">
                <span class="text-[10px] font-bold text-on-surface-variant uppercase">พื้นที่ (Location)</span>
                <span id="locDisplay" class="text-sm font-bold text-error">รอการสแกน</span>
            </div>
            
            <div class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant flex flex-col items-center justify-center gap-2 text-center h-24 shadow-sm">
                <span class="text-[10px] font-bold text-on-surface-variant uppercase">รหัสสินค้า</span>
                <span id="itemDisplay" class="text-sm font-bold text-on-surface-variant">-</span>
            </div>
        </div>

        <button id="toggleCameraBtn" onclick="toggleCamera()" class="w-full bg-surface-container-lowest text-primary font-bold py-3 rounded-xl shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2 border border-outline-variant">
            <span class="material-symbols-outlined" id="cameraIcon">photo_camera</span> 
            <span id="cameraBtnText">เปิดกล้องสแกน</span>
        </button>

        <div id="reader" class="hidden shadow-sm"></div>

        <div class="mt-2">
            <h3 class="text-sm font-bold text-on-surface-variant mb-3 flex items-center gap-1">
                <span class="material-symbols-outlined text-[18px]">inventory</span> สแกนแล้ว (<span id="scanCount">0</span>)
            </h3>
            <ul id="scannedList" class="flex flex-col gap-2">
                </ul>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-40">
        <button id="btnSave" onclick="saveData()" class="w-full bg-primary text-on-primary font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition-transform flex justify-center items-center gap-2 opacity-50 cursor-not-allowed" disabled>
            <span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล (<span id="btnCount">0</span>)
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzxKRgC-DyvyuRWPP2ibCw64fENrVx7qF4WO6997w4oLFtLnM84z5LAbhghD8o6YKPl/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const currentWoId = urlParams.get('wo') || "";
        
        let currentLocation = "";
        let scannedItems = [];
        let html5QrCode;
        let isCameraOpen = false;

        document.addEventListener("DOMContentLoaded", () => {
            if(currentWoId) {
                document.getElementById('woDisplay').innerText = currentWoId;
            }
        });

        function toggleCamera() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            if (isCameraOpen) {
                html5QrCode.stop().then(() => {
                    isCameraOpen = false;
                    document.getElementById('reader').classList.add('hidden');
                    document.getElementById('cameraBtnText').innerText = "เปิดกล้องสแกน";
                    document.getElementById('cameraIcon').innerText = "photo_camera";
                }).catch(err => console.error(err));
            } else {
                document.getElementById('reader').classList.remove('hidden');
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText, decodedResult) => { onScanSuccess(decodedText, decodedResult); },
                    (errorMessage) => { /* Ignore errors */ }
                ).then(() => {
                    isCameraOpen = true;
                    document.getElementById('cameraBtnText').innerText = "ปิดกล้อง";
                    document.getElementById('cameraIcon').innerText = "no_photography";
                }).catch(err => {
                    alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตให้สิทธิ์เข้าถึงกล้อง");
                });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            const hasLetters = /[a-zA-Z]/.test(decodedText);

            if (hasLetters) {
                currentLocation = decodedText.toUpperCase();
                const locEl = document.getElementById('locDisplay');
                locEl.innerText = currentLocation;
                locEl.classList.remove('text-error');
                locEl.classList.add('text-primary');
                
                if(navigator.vibrate) navigator.vibrate(100); 
            } else {
                if (!currentLocation) {
                    alert("⚠️ กรุณาสแกน QR พื้นที่ (Location) ก่อนครับ!");
                    return;
                }
                
                const exists = scannedItems.find(item => item.qrLabel === decodedText);
                if (exists) return;

                const now = new Date();
                const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                scannedItems.push({
                    qrLabel: decodedText,
                    location: currentLocation,
                    actualWeight: 40,
                    scanTime: timeString
                });

                document.getElementById('itemDisplay').innerText = decodedText;
                document.getElementById('itemDisplay').classList.replace('text-on-surface-variant', 'text-primary');

                if(navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('scannedList');
            list.innerHTML = '';
            
            scannedItems.forEach((item, index) => {
                // 👁️ เพิ่มปุ่มลูกตาเข้าไปในรายการสินค้าที่สแกนแล้ว
                list.innerHTML += `
                    <li class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden">
                        <div class="swipe-container">
                            <div class="swipe-content p-3 flex justify-between items-center bg-surface-container-lowest">
                                <div>
                                    <p class="font-mono font-bold text-primary text-sm">${item.qrLabel}</p>
                                    <p class="text-[10px] text-on-surface-variant mt-0.5">
                                        <span class="font-bold">เวลา:</span> ${item.scanTime} | 
                                        <span class="font-bold">พิกัด:</span> <span class="text-primary">${item.location}</span>
                                    </p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="viewQrDetails('${item.qrLabel}')" class="text-on-surface-variant hover:text-primary p-1 active:scale-90 transition-colors">
                                        <span class="material-symbols-outlined text-[22px]">visibility</span>
                                    </button>
                                    <span class="material-symbols-outlined text-outline-variant opacity-30 text-[18px]">swipe_left</span>
                                </div>
                            </div>
                            <button onclick="removeItem(${index})" class="swipe-action bg-error text-white flex justify-center items-center active:scale-95 transition-transform">
                                <span class="material-symbols-outlined text-[24px]">delete</span>
                            </button>
                        </div>
                    </li>
                `;
            });

            const count = scannedItems.length;
            document.getElementById('scanCount').innerText = count;
            document.getElementById('btnCount').innerText = count;

            const btnSave = document.getElementById('btnSave');
            if (count > 0) {
                btnSave.disabled = false;
                btnSave.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btnSave.disabled = true;
                btnSave.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // ฟังก์ชันสำหรับกดดูลูกตาที่รายการสแกน (เตรียมไว้ผูกระบบหลังบ้าน)
        function viewQrDetails(qrCode) {
            alert("เตรียมดึงข้อมูลตรวจสอบ QR: " + qrCode);
        }

        function removeItem(index) {
            scannedItems.splice(index, 1);
            updateUI();
        }

        function saveData() {
            if (scannedItems.length === 0) return;
            
            const btn = document.getElementById('btnSave');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> กำลังบันทึก...';
            btn.disabled = true;

            if(isCameraOpen && html5QrCode) {
                html5QrCode.stop().catch(err => console.error(err));
            }

            const payload = {
                action: "syncWorkOrder",
                workOrderId: currentWoId || "ไม่ระบุใบงาน", 
                items: scannedItems
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    alert("✅ บันทึกข้อมูลเรียบร้อยแล้ว!");
                    window.location.href = "index.html"; 
                } else {
                    alert("❌ เกิดข้อผิดพลาด: " + res.message);
                    btn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล';
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
                btn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
