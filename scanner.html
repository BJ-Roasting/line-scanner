<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - Roastery Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#271310", "on-primary": "#ffffff", "surface": "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442", "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd", "outline-variant": "#d3c3c0", error: "#ba1a1a", "error-container": "#ffdad6" },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--color-outline-variant); background: white; }
        #reader video { object-fit: cover; }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col antialiased">

    <header class="w-full top-0 sticky bg-surface flex items-center px-4 h-14 z-30 shadow-sm border-b border-outline-variant">
        <a href="index.html" class="mr-3 p-1.5 rounded-full hover:bg-surface-container-low active:scale-90 transition-all text-on-surface-variant">
            <span class="material-symbols-outlined text-[24px]">arrow_back</span>
        </a>
        <h1 class="text-lg font-bold tracking-tight text-primary flex-1 truncate" id="headerTitle">สแกนรับเข้า</h1>
    </header>

    <main class="p-4 flex flex-col gap-4 w-full max-w-lg mx-auto pb-24">
        
        <div class="bg-surface-container-lowest p-4 rounded-2xl border-2 border-outline-variant shadow-sm flex flex-col gap-2 relative overflow-hidden">
            <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-primary"></div>
            <div class="flex justify-between items-center pl-2">
                <span class="text-xs font-bold text-on-surface-variant uppercase">ใบงานที่กำลังทำ</span>
                <span id="woDisplay" class="text-xs font-bold bg-surface-container-low text-primary px-2 py-1 rounded-md font-mono border border-outline-variant">ไม่ระบุใบงาน</span>
            </div>
            <div class="flex justify-between items-center mt-2 border-t border-outline-variant/50 pt-2 pl-2">
                <span class="text-[11px] font-bold text-on-surface-variant uppercase">พื้นที่จัดเก็บ (Location)</span>
                <span id="locDisplay" class="text-sm font-bold text-error bg-error-container px-2 py-1 rounded-md">สแกน Location ก่อน</span>
            </div>
        </div>

        <div id="reader" class="shadow-sm"></div>

        <div>
            <h3 class="text-sm font-bold text-on-surface-variant uppercase mb-2 flex items-center gap-1">
                <span class="material-symbols-outlined text-[18px]">inventory</span> สแกนแล้ว (<span id="scanCount">0</span>)
            </h3>
            <ul id="scannedList" class="flex flex-col gap-2">
            </ul>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-40">
        <button id="btnSave" onclick="saveData()" class="w-full bg-primary text-on-primary font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition-transform flex justify-center items-center gap-2 opacity-50 cursor-not-allowed" disabled>
            <span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล (<span id="btnCount">0</span>)
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzxKRgC-DyvyuRWPP2ibCw64fENrVx7qF4WO6997w4oLFtLnM84z5LAbhghD8o6YKPl/exec";
        
        // ดึงรหัสใบงานจาก URL (อันนี้คือส่วนสำคัญที่เพิ่มเข้ามา)
        const urlParams = new URLSearchParams(window.location.search);
        const currentWoId = urlParams.get('wo') || "";
        
        let currentLocation = "";
        let scannedItems = [];
        let html5QrcodeScanner;

        document.addEventListener("DOMContentLoaded", () => {
            // โชว์รหัสใบงาน
            if(currentWoId) {
                document.getElementById('woDisplay').innerText = currentWoId;
                document.getElementById('headerTitle').innerText = "รับเข้า: " + currentWoId;
            }
            
            // เรียกใช้หน้าต่างกล้องแบบเก่า
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render(onScanSuccess);
        });

        function onScanSuccess(decodedText, decodedResult) {
            const hasLetters = /[a-zA-Z]/.test(decodedText);

            if (hasLetters) {
                currentLocation = decodedText.toUpperCase();
                const locEl = document.getElementById('locDisplay');
                locEl.innerText = currentLocation;
                locEl.className = 'text-sm font-bold text-primary bg-surface-container-low border border-outline-variant px-2 py-1 rounded-md';
                
                if(navigator.vibrate) navigator.vibrate(100); 
            } else {
                if (!currentLocation) {
                    alert("⚠️ กรุณาสแกน QR พื้นที่จัดเก็บ (Location) ก่อนครับ!");
                    return;
                }
                
                const exists = scannedItems.find(item => item.qrLabel === decodedText);
                if (exists) return;

                scannedItems.push({
                    qrLabel: decodedText,
                    location: currentLocation,
                    actualWeight: 40
                });

                if(navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('scannedList');
            list.innerHTML = '';
            
            scannedItems.forEach((item, index) => {
                list.innerHTML += `
                    <li class="bg-surface-container-lowest p-3 rounded-xl border border-outline-variant shadow-sm flex justify-between items-center relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary/50"></div>
                        <div class="pl-2">
                            <p class="font-mono font-bold text-primary text-sm">${item.qrLabel}</p>
                            <p class="text-[10px] font-bold text-on-surface-variant uppercase mt-0.5">พิกัด: <span class="text-primary">${item.location}</span></p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-error bg-error-container hover:bg-error hover:text-on-primary p-2 rounded-lg active:scale-90 transition-colors">
                            <span class="material-symbols-outlined text-[18px]">delete</span>
                        </button>
                    </li>
                `;
            });

            const count = scannedItems.length;
            document.getElementById('scanCount').innerText = count;
            document.getElementById('btnCount').innerText = count;

            const btnSave = document.getElementById('btnSave');
            if (count > 0) {
                btnSave.disabled = false;
                btnSave.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btnSave.disabled = true;
                btnSave.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        function removeItem(index) {
            scannedItems.splice(index, 1);
            updateUI();
        }

        function saveData() {
            if (scannedItems.length === 0) return;
            
            const btn = document.getElementById('btnSave');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> กำลังบันทึก...';
            btn.disabled = true;

            const payload = {
                action: "syncWorkOrder",
                workOrderId: currentWoId || "ไม่ระบุใบงาน", 
                items: scannedItems
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    alert("✅ บันทึกข้อมูลเรียบร้อยแล้ว!");
                    window.location.href = "index.html"; 
                } else {
                    alert("❌ เกิดข้อผิดพลาด: " + res.message);
                    btn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล';
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
                btn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
