<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - Roastery Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#271310", "on-primary": "#ffffff", "surface": "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442", "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd", "outline-variant": "#d3c3c0", error: "#ba1a1a", "error-container": "#ffdad6", "secondary-container": "#e1e1c9", "on-secondary-container": "#636451" },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--color-outline-variant); background: black; }
        #reader video { object-fit: cover !important; width: 100% !important; }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col antialiased">

    <header class="w-full top-0 sticky bg-surface flex items-center px-4 h-14 z-30 shadow-sm border-b border-outline-variant">
        <a href="index.html" class="mr-3 p-1.5 rounded-full hover:bg-surface-container-low active:scale-90 transition-all text-on-surface-variant">
            <span class="material-symbols-outlined text-[24px]">arrow_back</span>
        </a>
        <h1 class="text-lg font-bold tracking-tight text-primary flex-1 truncate" id="headerTitle">สแกนรับเข้า</h1>
    </header>

    <main class="p-4 flex flex-col gap-4 w-full max-w-lg mx-auto pb-24">
        
        <div class="bg-surface-container-low p-3 rounded-xl border border-outline-variant flex justify-between items-center shadow-sm">
            <span class="text-xs font-bold text-on-surface-variant uppercase">ใบงานปัจจุบัน:</span>
            <span id="woDisplay" class="text-sm font-bold text-primary font-mono bg-surface-container-lowest px-2 py-1 rounded border border-outline-variant">ไม่ระบุใบงาน</span>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-surface-container-lowest p-4 rounded-2xl border-2 border-outline-variant shadow-sm flex flex-col items-center justify-center gap-2 text-center h-28 relative overflow-hidden">
                <div class="absolute left-0 top-0 w-full h-1 bg-primary/30"></div>
                <span class="material-symbols-outlined text-outline-variant text-3xl absolute opacity-20 right-[-10px] bottom-[-10px]">location_on</span>
                <span class="text-[10px] font-bold text-on-surface-variant uppercase z-10">พื้นที่ (Location)</span>
                <span id="locDisplay" class="text-sm font-bold text-error z-10">รอการสแกน</span>
            </div>
            
            <div class="bg-surface-container-lowest p-4 rounded-2xl border-2 border-outline-variant shadow-sm flex flex-col items-center justify-center gap-2 text-center h-28 relative overflow-hidden">
                <div class="absolute left-0 top-0 w-full h-1 bg-primary/30"></div>
                <span class="material-symbols-outlined text-outline-variant text-3xl absolute opacity-20 right-[-10px] bottom-[-10px]">qr_code_2</span>
                <span class="text-[10px] font-bold text-on-surface-variant uppercase z-10">รหัสพาเลทล่าสุด</span>
                <span id="itemDisplay" class="text-sm font-bold text-on-surface-variant z-10">-</span>
            </div>
        </div>

        <button id="toggleCameraBtn" onclick="toggleCamera()" class="w-full bg-secondary-container text-on-secondary-container font-bold py-3.5 rounded-xl shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2 border border-outline-variant">
            <span class="material-symbols-outlined" id="cameraIcon">photo_camera</span> 
            <span id="cameraBtnText">เปิดกล้องสแกน</span>
        </button>

        <div id="reader" class="hidden shadow-md"></div>

        <div class="mt-2">
            <h3 class="text-sm font-bold text-on-surface-variant uppercase mb-3 flex items-center gap-1">
                <span class="material-symbols-outlined text-[18px]">inventory</span> สแกนแล้ว (<span id="scanCount">0</span>)
            </h3>
            <ul id="scannedList" class="flex flex-col gap-2">
                </ul>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-40">
        <button id="btnSave" onclick="saveData()" class="w-full bg-primary text-on-primary font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition-transform flex justify-center items-center gap-2 opacity-50 cursor-not-allowed" disabled>
            <span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล (<span id="btnCount">0</span>)
        </button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzxKRgC-DyvyuRWPP2ibCw64fENrVx7qF4WO6997w4oLFtLnM84z5LAbhghD8o6YKPl/exec";
        
        // 💡 1. ดึงรหัสใบงานจาก URL มาเก็บไว้
        const urlParams = new URLSearchParams(window.location.search);
        const currentWoId = urlParams.get('wo') || "";
        
        let currentLocation = "";
        let scannedItems = [];
        let html5QrCode;
        let isCameraOpen = false;

        document.addEventListener("DOMContentLoaded", () => {
            // โชว์รหัสใบงาน
            if(currentWoId) {
                document.getElementById('woDisplay').innerText = currentWoId;
                document.getElementById('headerTitle').innerText = "รับเข้า: " + currentWoId;
            }
        });

        // 💡 2. ระบบเปิด-ปิดกล้องเอง
        function toggleCamera() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            if (isCameraOpen) {
                // ถ้าเปิดอยู่ ให้ปิด
                html5QrCode.stop().then(() => {
                    isCameraOpen = false;
                    document.getElementById('reader').classList.add('hidden');
                    document.getElementById('cameraBtnText').innerText = "เปิดกล้องสแกน";
                    document.getElementById('cameraIcon').innerText = "photo_camera";
                    document.getElementById('toggleCameraBtn').classList.replace('bg-error-container', 'bg-secondary-container');
                    document.getElementById('toggleCameraBtn').classList.replace('text-error', 'text-on-secondary-container');
                }).catch(err => console.error(err));
            } else {
                // ถ้าปิดอยู่ ให้เปิด
                document.getElementById('reader').classList.remove('hidden');
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText, decodedResult) => { onScanSuccess(decodedText, decodedResult); },
                    (errorMessage) => { /* Ignore errors */ }
                ).then(() => {
                    isCameraOpen = true;
                    document.getElementById('cameraBtnText').innerText = "ปิดกล้อง";
                    document.getElementById('cameraIcon').innerText = "no_photography";
                    document.getElementById('toggleCameraBtn').classList.replace('bg-secondary-container', 'bg-error-container');
                    document.getElementById('toggleCameraBtn').classList.replace('text-on-secondary-container', 'text-error');
                }).catch(err => {
                    alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตให้สิทธิ์เข้าถึงกล้อง");
                });
            }
        }

        // 💡 3. เมื่อสแกนติด
        function onScanSuccess(decodedText, decodedResult) {
            const hasLetters = /[a-zA-Z]/.test(decodedText);

            if (hasLetters) {
                // เป็น Location
                currentLocation = decodedText.toUpperCase();
                const locEl = document.getElementById('locDisplay');
                locEl.innerText = currentLocation;
                locEl.classList.remove('text-error');
                locEl.classList.add('text-primary');
                
                if(navigator.vibrate) navigator.vibrate(100); 
            } else {
                // เป็นรหัสสินค้า (Item)
                if (!currentLocation) {
                    alert("⚠️ กรุณาสแกน QR พื้นที่ (Location) ลงกล่องซ้ายก่อนครับ!");
                    return;
                }
                
                const exists = scannedItems.find(item => item.qrLabel === decodedText);
                if (exists) return;

                scannedItems.push({
                    qrLabel: decodedText,
                    location: currentLocation,
                    actualWeight: 40
                });

                // อัปเดตกล่องขวา
                document.getElementById('itemDisplay').innerText = decodedText;
                document.getElementById('itemDisplay').classList.replace('text-on-surface-variant', 'text-primary');

                if(navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('scannedList');
            list.innerHTML = '';
            
            scannedItems.forEach((item, index) => {
                list.innerHTML += `
                    <li class="bg-surface-container-lowest p-3 rounded-xl border border-outline-variant shadow-sm flex justify-between items-center relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary/50"></div>
                        <div class="pl-2">
                            <p class="font-mono font-bold text-primary text-sm">${item.qrLabel}</p>
                            <p class="text-[10px] font-bold text-on-surface-variant uppercase mt-0.5">พิกัด: <span class="text-primary">${item.location}</span></p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-error bg-error-container hover:bg-error hover:text-on-primary p-2 rounded-lg active:scale-90 transition-colors">
                            <span class="material-symbols-outlined text-[18px]">delete</span>
                        </button>
                    </li>
                `;
            });

            const count = scannedItems.length;
            document.getElementById('scanCount').innerText = count;
            document.getElementById('btnCount').innerText = count;

            const btnSave = document.getElementById('btnSave');
            if (count > 0) {
                btnSave.disabled = false;
                btnSave.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btnSave.disabled = true;
                btnSave.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        function removeItem(index) {
            scannedItems.splice(index, 1);
            updateUI();
        }

        function saveData() {
            if (scannedItems.length === 0) return;
            
            const btn = document.getElementById('btnSave');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> กำลังบันทึก...';
            btn.disabled = true;

            // ปิดกล้องก่อนเซฟ
            if(isCameraOpen && html5QrCode) {
                html5QrCode.stop().catch(err => console.error(err));
            }

            // 💡 4. ส่งข้อมูลพร้อมรหัสใบงาน
            const payload = {
                action: "syncWorkOrder",
                workOrderId: currentWoId || "ไม่ระบุใบงาน", 
                items: scannedItems
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    alert("✅ บันทึกข้อมูลเรียบร้อยแล้ว!");
                    window.location.href = "index.html"; // กลับไปหน้าแรก
                } else {
                    alert("❌ เกิดข้อผิดพลาด: " + res.message);
                    btn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล';
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
                btn.innerHTML = '<span class="material-symbols-outlined">cloud_upload</span> บันทึกข้อมูล';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
