<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generate QR Code - Roastery Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#271310", "on-primary": "#ffffff", "primary-container": "#3e2723",
                        surface: "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442",
                        "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd",
                        "outline-variant": "#d3c3c0", error: "#ba1a1a"
                    },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            #printArea { display: flex !important; flex-wrap: wrap; gap: 10px; justify-content: center; }
            .qr-card { page-break-inside: avoid; border: 1px solid #ccc; padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 10px;}
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col antialiased">

    <!-- Header (ซ่อนตอนพิมพ์) -->
    <header class="flex items-center p-4 mb-2 no-print border-b border-outline-variant bg-surface sticky top-0 z-10 shadow-sm">
        <a href="admin_dashboard.html" class="mr-3 p-2 bg-surface-container-low rounded-full active:scale-95 transition-transform border border-outline-variant flex items-center justify-center text-on-surface-variant">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-xl font-bold tracking-tight text-primary flex-1">สร้าง QR Code</h1>
    </header>

    <main class="w-full max-w-xl mx-auto p-4 no-print">
        <div class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm border border-outline-variant mb-6">
            <form id="qrForm" onsubmit="generateQR(event)" class="flex flex-col gap-4">
                
                <!-- เลือกประเภท QR -->
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">ประเภท QR Code</label>
                    <select id="qrType" onchange="toggleQrType()" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                        <option value="ITEM">📦 QR สินค้า / พาเลท (ตัวเลขล้วน)</option>
                        <option value="LOCATION">📍 QR พื้นที่จัดเก็บ (มีตัวอักษร)</option>
                    </select>
                </div>

                <!-- Input สำหรับ QR สินค้า -->
                <div id="itemInputGroup" class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">เลข Lot (ใส่เฉพาะตัวเลข)</label>
                    <input type="number" id="lotCode" required placeholder="เช่น 260726" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                </div>

                <!-- Input สำหรับ QR พื้นที่ (ซ่อนไว้เป็นค่าเริ่มต้น) -->
                <div id="locInputGroup" class="flex flex-col gap-1 hidden">
                    <label class="text-xs font-bold text-on-surface-variant uppercase">ตัวอักษรโซน / พื้นที่</label>
                    <input type="text" id="prefixCode" placeholder="เช่น A, B หรือ ZONE" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary uppercase">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">จำนวนดวงที่พิมพ์</label>
                        <input type="number" id="qty" required min="1" max="100" value="10" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">เริ่มรันเลขที่</label>
                        <input type="number" id="startNum" required min="1" value="1" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                    </div>
                </div>

                <div class="flex gap-2 mt-2">
                    <button type="submit" class="flex-1 bg-primary text-on-primary font-bold py-3 rounded-xl shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
                        <span class="material-symbols-outlined">qr_code_2</span> ดูตัวอย่าง
                    </button>
                    <button type="button" onclick="window.print()" class="flex-1 bg-secondary-container text-on-secondary-container font-bold py-3 rounded-xl shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2 border border-outline-variant">
                        <span class="material-symbols-outlined">print</span> พิมพ์สติกเกอร์
                    </button>
                </div>
            </form>
        </div>

        <div class="text-xs text-on-surface-variant mb-2 font-bold px-2">ตัวอย่างการแสดงผล (กดปุ่มพิมพ์เพื่อปรินต์ลงกระดาษ)</div>
    </main>

    <!-- พื้นที่แสดงผล QR Code (สำหรับปรินต์) -->
    <div id="printArea" class="w-full max-w-4xl mx-auto flex flex-wrap gap-4 justify-center pb-10 p-4"></div>

    <script>
        // สลับฟอร์มเวลากดเปลี่ยนประเภท
        function toggleQrType() {
            const type = document.getElementById('qrType').value;
            const itemInput = document.getElementById('itemInputGroup');
            const locInput = document.getElementById('locInputGroup');
            const lotCode = document.getElementById('lotCode');
            const prefixCode = document.getElementById('prefixCode');

            if (type === 'ITEM') {
                itemInput.classList.remove('hidden');
                locInput.classList.add('hidden');
                lotCode.required = true;
                prefixCode.required = false;
            } else {
                itemInput.classList.add('hidden');
                locInput.classList.remove('hidden');
                lotCode.required = false;
                prefixCode.required = true;
            }
        }

        function generateQR(e) {
            e.preventDefault();
            const type = document.getElementById('qrType').value;
            const qty = parseInt(document.getElementById('qty').value);
            const startNum = parseInt(document.getElementById('startNum').value);
            
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ''; // ล้างของเก่าออก

            for (let i = 0; i < qty; i++) {
                const currentNum = startNum + i;
                // จัดรูปแบบตัวเลขให้เป็น 3 หลักเสมอ (เช่น 001, 002)
                const numString = currentNum.toString().padStart(3, '0'); 
                
                let qrText = "";
                let titleText = "";

                // ตรวจสอบเงื่อนไขการสร้างรหัสตามประเภท
                if (type === 'ITEM') {
                    const lot = document.getElementById('lotCode').value.trim();
                    qrText = `${lot}${numString}`; // ตัวเลขติดกัน ไม่มีขีด
                    titleText = "ITEM / PALLET";
                } else {
                    const prefix = document.getElementById('prefixCode').value.trim().toUpperCase();
                    qrText = `${prefix}${numString}`; // ตัวอักษรติดตัวเลข ไม่มีขีด
                    titleText = "LOCATION";
                }

                // สร้างกล่องบรรจุ QR
                const card = document.createElement('div');
                card.className = 'qr-card bg-surface-container-lowest flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant w-40 h-48 shadow-sm';
                
                // ส่วนหัว
                const header = document.createElement('div');
                header.className = 'text-[10px] font-bold text-on-surface-variant mb-2';
                header.innerText = titleText;
                card.appendChild(header);

                // พื้นที่วางภาพ QR
                const qrDiv = document.createElement('div');
                card.appendChild(qrDiv);

                // ส่วนข้อความด้านล่าง (รหัส)
                const label = document.createElement('div');
                label.className = 'font-mono font-bold text-primary mt-2 text-sm text-center break-all tracking-wider';
                label.innerText = qrText;
                card.appendChild(label);

                printArea.appendChild(card);

                // สร้างรูป QR
                new QRCode(qrDiv, {
                    text: qrText,
                    width: 110,
                    height: 110,
                    colorDark : "#271310", 
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }

        // โหลดตัวอย่างทันทีที่เปิดหน้า
        window.onload = () => {
            document.getElementById('lotCode').value = "260726"; // ใส่ค่าเริ่มต้นให้เห็นภาพ
            document.getElementById('qrForm').dispatchEvent(new Event('submit'));
        };
    </script>
</body>
</html>
