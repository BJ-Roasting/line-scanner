<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generate QR Code - Roastery Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- ไลบรารีสำหรับสร้าง QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#271310", "on-primary": "#ffffff", "primary-container": "#3e2723",
                        surface: "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442",
                        "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd",
                        "outline-variant": "#d3c3c0", error: "#ba1a1a"
                    },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* 🖨️ ตั้งค่าสำหรับการพริ้นต์ (ซ่อน UI อื่นๆ โชว์แค่ QR Code) */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            #printArea { display: flex !important; flex-wrap: wrap; gap: 10px; justify-content: center; }
            .qr-card { page-break-inside: avoid; border: 1px solid #ccc; padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 10px;}
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col antialiased">

    <!-- Header (ซ่อนตอนพิมพ์) -->
    <header class="flex items-center p-4 mb-2 no-print border-b border-outline-variant bg-surface sticky top-0 z-10 shadow-sm">
        <a href="admin_dashboard.html" class="mr-3 p-2 bg-surface-container-low rounded-full active:scale-95 transition-transform border border-outline-variant flex items-center justify-center text-on-surface-variant">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-xl font-bold tracking-tight text-primary flex-1">เครื่องมือสร้าง QR Code</h1>
    </header>

    <!-- ฟอร์มกรอกข้อมูล (ซ่อนตอนพิมพ์) -->
    <main class="w-full max-w-xl mx-auto p-4 no-print">
        <div class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm border border-outline-variant mb-6">
            <form id="qrForm" onsubmit="generateQR(event)" class="flex flex-col gap-4">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">รหัสอ้างอิง (Prefix)</label>
                        <input type="text" id="prefix" required placeholder="เช่น AD05" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary uppercase">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">เลข Lot / วันที่</label>
                        <input type="text" id="lot" placeholder="เช่น 260726" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary uppercase">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">จำนวนดวงที่ต้องการ</label>
                        <input type="number" id="qty" required min="1" max="100" value="10" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-on-surface-variant uppercase">เริ่มรันเลขที่ (Start)</label>
                        <input type="number" id="startNum" required min="1" value="1" class="w-full px-3 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                    </div>
                </div>

                <div class="flex gap-2 mt-2">
                    <button type="submit" class="flex-1 bg-primary text-on-primary font-bold py-3 rounded-xl shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
                        <span class="material-symbols-outlined">qr_code_2</span> สร้าง QR
                    </button>
                    <button type="button" onclick="window.print()" class="flex-1 bg-secondary-container text-on-secondary-container font-bold py-3 rounded-xl shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2 border border-outline-variant">
                        <span class="material-symbols-outlined">print</span> พิมพ์
                    </button>
                </div>
            </form>
        </div>

        <div class="text-xs text-on-surface-variant mb-2 font-bold px-2">ตัวอย่างการแสดงผล (กดปุ่มพิมพ์เพื่อปรินต์ลงกระดาษ)</div>
    </main>

    <!-- พื้นที่แสดงผล QR Code (สำหรับปรินต์) -->
    <div id="printArea" class="w-full max-w-4xl mx-auto flex flex-wrap gap-4 justify-center pb-10 p-4">
        <!-- QR Code จะถูกสร้างที่นี่ -->
    </div>

    <script>
        function generateQR(e) {
            e.preventDefault();
            const prefix = document.getElementById('prefix').value.trim().toUpperCase();
            const lot = document.getElementById('lot').value.trim().toUpperCase();
            const qty = parseInt(document.getElementById('qty').value);
            const startNum = parseInt(document.getElementById('startNum').value);
            
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ''; // ล้างของเก่าออก

            for (let i = 0; i < qty; i++) {
                const currentNum = startNum + i;
                // จัดรูปแบบตัวเลขให้เป็น 3 หลัก (เช่น 001, 002)
                const numString = currentNum.toString().padStart(3, '0'); 
                
                // สร้างข้อความ QR Code (ตัวอย่าง: AD05-260726-001)
                let qrText = prefix;
                if (lot !== "") qrText += `-${lot}`;
                qrText += `-${numString}`;

                // สร้างกล่องบรรจุ QR
                const card = document.createElement('div');
                card.className = 'qr-card bg-surface-container-lowest flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant w-40 h-48 shadow-sm';
                
                // ส่วนหัว
                const header = document.createElement('div');
                header.className = 'text-[10px] font-bold text-on-surface-variant mb-2';
                header.innerText = 'Roastery Ops';
                card.appendChild(header);

                // พื้นที่วางภาพ QR
                const qrDiv = document.createElement('div');
                card.appendChild(qrDiv);

                // ส่วนข้อความด้านล่าง (รหัส)
                const label = document.createElement('div');
                label.className = 'font-mono font-bold text-primary mt-2 text-[11px] text-center break-all';
                label.innerText = qrText;
                card.appendChild(label);

                printArea.appendChild(card);

                // เรียกใช้ไลบรารีวาด QR Code ลงใน qrDiv
                new QRCode(qrDiv, {
                    text: qrText,
                    width: 100,
                    height: 100,
                    colorDark : "#271310", // สี QR ตามธีม
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }

        // สร้างตัวอย่างเริ่มต้นโชว์ตอนเปิดหน้าเว็บ
        window.onload = () => {
            document.getElementById('qrForm').dispatchEvent(new Event('submit'));
        };
    </script>
</body>
</html>
