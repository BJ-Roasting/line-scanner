<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register Master Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#271310", "on-primary": "#ffffff", surface: "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442", "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd", "outline-variant": "#d3c3c0", error: "#ba1a1a" },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col p-4 antialiased">

    <header class="flex items-center mb-6">
        <a href="admin_dashboard.html" class="mr-3 p-2 bg-surface-container-low rounded-full active:scale-95 transition-transform border border-outline-variant flex items-center justify-center text-on-surface-variant">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-2xl font-bold tracking-tight text-primary">ลงทะเบียนสินค้า/Supplier</h1>
    </header>

    <main class="w-full max-w-md mx-auto bg-surface-container-lowest p-6 rounded-2xl shadow-sm border border-outline-variant">
        <form id="registerForm" onsubmit="handleRegister(event)" class="flex flex-col gap-4">
            
            <!-- หมวดหมู่ Supplier -->
            <div class="p-4 bg-surface-container-low rounded-xl border border-outline-variant flex flex-col gap-3">
                <h2 class="text-sm font-bold text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">domain</span> ข้อมูลซัพพลายเออร์
                </h2>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase">ชื่อบริษัท / ผู้จัดจำหน่าย</label>
                    <input type="text" id="suppName" required placeholder="เช่น บริษัท สยาม คอฟฟี่ เทรด จำกัด" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase">รหัสย่อ (Supplier Code)</label>
                    <input type="text" id="suppCode" required placeholder="เช่น SC" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary uppercase">
                </div>
            </div>

            <!-- หมวดหมู่ สารกาแฟ/สินค้า -->
            <div class="p-4 bg-surface-container-low rounded-xl border border-outline-variant flex flex-col gap-3">
                <h2 class="text-sm font-bold text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">inventory_2</span> ข้อมูลสินค้า (Item)
                </h2>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase">ชื่อสินค้า / สารกาแฟ</label>
                    <input type="text" id="itemName" required placeholder="เช่น ดอยช้าง Wash สีอย่างเดียว" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase">รหัสสินค้า (Item Code)</label>
                    <input type="text" id="itemCode" required placeholder="เช่น PY" class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg font-bold text-primary uppercase">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl mt-2 shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
                <span class="material-symbols-outlined">save</span> บันทึกข้อมูลเข้าระบบ
            </button>
        </form>
    </main>

    <script>
        // 🚀 URL ของระบบ API หลังบ้าน
        const API_URL = "https://script.google.com/macros/s/AKfycbzxKRgC-DyvyuRWPP2ibCw64fENrVx7qF4WO6997w4oLFtLnM84z5LAbhghD8o6YKPl/exec";

        function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit");
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> กำลังบันทึก...';
            btn.disabled = true;

            const payload = {
                action: "registerSupplierItem",
                data: {
                    supplierName: document.getElementById('suppName').value,
                    supplierCode: document.getElementById('suppCode').value.toUpperCase(),
                    itemName: document.getElementById('itemName').value,
                    itemCode: document.getElementById('itemCode').value.toUpperCase()
                }
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    alert(res.message);
                    document.getElementById('registerForm').reset();
                } else {
                    alert("เกิดข้อผิดพลาด: " + res.message);
                }
            })
            .catch(err => alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้"))
            .finally(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">save</span> บันทึกข้อมูลเข้าระบบ';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
