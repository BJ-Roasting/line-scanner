<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard - Roastery Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#271310", "on-primary": "#ffffff", "primary-container": "#3e2723",
                        surface: "#f4faff", "on-surface": "#111d23", "on-surface-variant": "#504442",
                        "surface-container-lowest": "#ffffff", "surface-container-low": "#e9f6fd",
                        "surface-container-high": "#ddeaf2", "outline-variant": "#d3c3c0",
                        "secondary-container": "#e1e1c9", "on-secondary-container": "#636451",
                        error: "#ba1a1a", "error-container": "#ffdad6"
                    },
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans min-h-screen flex flex-col pb-24 antialiased relative">

    <!-- เมนูด้านบน -->
    <header class="w-full top-0 sticky border-b border-outline-variant bg-surface flex items-center px-4 h-14 z-30 shadow-sm">
        <button onclick="toggleSidebar()" class="mr-3 p-1.5 rounded-full hover:bg-surface-container-high active:scale-90 transition-all">
            <span class="material-symbols-outlined text-primary text-[24px]">menu</span>
        </button>
        <h1 class="text-xl font-bold tracking-tighter text-primary flex-1">ADMIN DASHBOARD</h1>
    </header>

    <!-- แผง Sidebar ด้านข้าง -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-on-surface/50 z-40 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm" onclick="toggleSidebar()"></div>
    
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-surface-container-lowest border-r border-outline-variant z-50 transform -translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="h-14 flex items-center justify-between px-4 border-b border-outline-variant bg-surface">
            <h2 class="font-bold text-primary flex items-center gap-2">
                <span class="material-symbols-outlined">menu_open</span> เมนูจัดการ
            </h2>
            <button onclick="toggleSidebar()" class="text-on-surface-variant hover:text-error p-1 rounded-full active:scale-90 transition-transform">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <nav class="flex-1 overflow-y-auto p-4 flex flex-col gap-2">
            <a href="admin.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-on-surface hover:bg-surface-container-low transition-colors shadow-sm border border-transparent hover:border-outline-variant">
                <span class="material-symbols-outlined text-primary">add_box</span> สร้างใบงาน
            </a>
            <a href="qrcode.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-on-surface hover:bg-surface-container-low transition-colors shadow-sm border border-transparent hover:border-outline-variant">
                <span class="material-symbols-outlined text-primary">qr_code_2</span> สร้าง QR Code
            </a>
        </nav>
        
        <div class="p-4 border-t border-outline-variant bg-surface-container-low">
            <p class="text-[10px] text-center text-on-surface-variant font-bold">Roastery Ops System v1.0</p>
        </div>
    </aside>

    <!-- พื้นที่แสดงข้อมูลแบบ "การ์ด" -->
    <main class="p-4 w-full max-w-2xl mx-auto z-10 flex flex-col gap-4" id="woContainer">
        <!-- สถานะตอนกำลังโหลด -->
        <div class="text-center py-10 text-on-surface-variant animate-pulse font-bold text-sm bg-surface-container-lowest rounded-2xl border border-outline-variant shadow-sm">
            <span class="material-symbols-outlined animate-spin align-middle mr-2">sync</span> กำลังดึงข้อมูล...
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-2 bg-surface border-t border-outline-variant z-20">
        <a href="index.html" class="flex flex-col items-center justify-center text-on-surface-variant px-5 py-1.5 hover:bg-surface-container-high rounded-full active:scale-90 transition-all duration-150">
            <span class="material-symbols-outlined text-[24px]">dashboard</span>
            <span class="text-[10px] font-bold mt-1">หน้าแรก</span>
        </a>
        <a href="admin_dashboard.html" class="flex flex-col items-center justify-center text-primary bg-secondary-container rounded-full px-5 py-1.5 active:scale-90 transition-all duration-150">
            <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">list_alt</span>
            <span class="text-[10px] font-bold mt-1">แอดมิน</span>
        </a>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzxKRgC-DyvyuRWPP2ibCw64fENrVx7qF4WO6997w4oLFtLnM84z5LAbhghD8o6YKPl/exec";

        document.addEventListener("DOMContentLoaded", loadWorkOrders);

        // ระบบเปิด-ปิด Sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        // ระบบดึงข้อมูลใบงานและสร้างการ์ด
        function loadWorkOrders() {
            const container = document.getElementById("woContainer");
            
            fetch(API_URL + "?action=getActiveWorkOrders")
                .then(res => res.json())
                .then(res => {
                    if (res.status !== 'success' || !res.data || res.data.length === 0) {
                        container.innerHTML = `
                            <div class="text-center py-10 text-on-surface-variant font-bold bg-surface-container-lowest rounded-2xl border border-outline-variant shadow-sm flex flex-col items-center gap-2">
                                <span class="material-symbols-outlined text-4xl opacity-50">inbox</span>
                                ไม่มีใบงานที่กำลังดำเนินการ
                            </div>`;
                        return;
                    }
                    
                    container.innerHTML = '';
                    res.data.forEach(wo => {
                        let btnHtml = '';
                        if (wo.status === 'In-Progress' || wo.status === 'Re-opened') {
                            btnHtml = `<button onclick="cancelWorkOrder('${wo.woId}')" class="text-error bg-error-container hover:bg-error hover:text-on-primary px-3 py-2 rounded-lg text-[11px] font-bold transition-colors active:scale-95 shadow-sm flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">cancel</span> ยกเลิก</button>`;
                        }
                        
                        // สร้างการ์ดแทนตาราง
                        let card = `
                        <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant shadow-sm p-4 flex flex-col gap-3 relative overflow-hidden">
                            <!-- แถบสีตกแต่งด้านซ้าย -->
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
                            
                            <!-- ส่วนหัว: ID และ สถานะ -->
                            <div class="flex justify-between items-start pl-2">
                                <div>
                                    <span class="text-[9px] font-bold text-on-surface-variant uppercase bg-surface-container-high border border-outline-variant px-2 py-0.5 rounded-md tracking-wider">${wo.type}</span>
                                    <h3 class="font-mono font-bold text-primary mt-1 text-lg">${wo.woId}</h3>
                                </div>
                                <span class="bg-secondary-container text-on-secondary-container px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">${wo.status}</span>
                            </div>

                            <!-- ส่วนกลาง: รายการสินค้า -->
                            <div class="pl-2">
                                <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">รายการสินค้า</p>
                                <p class="text-sm font-bold text-primary leading-tight mt-0.5">${wo.item}</p>
                            </div>

                            <!-- ส่วนท้าย: ความคืบหน้า และ ปุ่มจัดการ -->
                            <div class="flex justify-between items-end mt-1 pt-3 border-t border-outline-variant pl-2">
                                <div>
                                    <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">พาเลทที่รับเข้าแล้ว</p>
                                    <p class="text-xl font-mono mt-0.5"><span class="font-bold text-primary">${wo.actual}</span><span class="text-sm text-on-surface-variant font-medium"> / ${wo.limit}</span></p>
                                </div>
                                ${btnHtml}
                            </div>
                        </div>`;
                        container.innerHTML += card;
                    });
                })
                .catch(err => {
                    container.innerHTML = `
                        <div class="text-center py-10 text-error font-bold bg-error-container rounded-2xl shadow-sm flex flex-col items-center gap-2">
                            <span class="material-symbols-outlined text-4xl">wifi_off</span>
                            ไม่สามารถเชื่อมต่อระบบได้
                        </div>`;
                });
        }

        function cancelWorkOrder(woId) {
            if (!confirm(`ยืนยันการยกเลิกใบงาน ${woId} ใช่หรือไม่?`)) return;
            
            const payload = { action: "cancelWorkOrder", woId: woId };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === 'success') {
                    alert(res.message);
                    loadWorkOrders();
                } else {
                    alert("เกิดข้อผิดพลาด: " + res.message);
                }
            })
            .catch(err => alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้"));
        }
    </script>
</body>
</html>
